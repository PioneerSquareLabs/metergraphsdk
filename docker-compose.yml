services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: metergraph
      POSTGRES_PASSWORD: metergraph
      POSTGRES_DB: metergraph
    volumes:
      - metergraph-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metergraph"]
      interval: 2s
      timeout: 2s
      retries: 15

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: postgresql://metergraph:metergraph@postgres:5432/metergraph
      MG_TOKENS: ${MG_TOKENS:-dev-token}
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  metergraph-data:
